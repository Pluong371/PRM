name: frontend
description: "ShopWeb Flutter Frontend"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  provider: ^6.4.0

  # Navigation
  go_router: ^14.8.1

  # HTTP
  dio: ^5.8.0+1

  # DI
  get_it: ^8.0.3

  # Secure Storage (JWT)
  flutter_secure_storage: ^9.2.4

  # Cart Persistence
  shared_preferences: ^2.3.2

  # AES Encryption
  encrypt: ^5.0.3
  crypto: ^3.0.6

  # Image Loading
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2

  # UI
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
